<!DOCTYPE html>
<!-- html5 doctype declaration -->

<html lang="en">
<!-- set language to english -->

<head>
    <meta charset="UTF-8">
    <!-- set character encoding to utf-8 -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- make page responsive on mobile devices -->

    <title>balatro start</title>
    <!-- page title shown in browser tab -->

    <!-- link to global css -->
    <link rel="stylesheet" href="css/global.css">

    <!-- link to start screen specific css -->
    <link rel="stylesheet" href="css/start.css">

    <!-- import pixel font from google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
    <!-- main container for start screen -->
    <div class="container start-screen">
        <!-- game title in center -->
        <h1 class="game-title">IDontKow</h1>
        <!-- class game-title for styling font size, color, outline, glow -->

        <!-- buttons container -->
        <div class="button-group">
            <!-- start game button -->
            <button class="start-button">START</button>
            <!-- instructions/guide button -->
            <button class="instructions-button">GUIDE</button>
        </div>
        <!-- end of buttons container -->
    </div>
    <!-- end of main start screen container -->

    <!-- start screen javascript -->
    <script src="js/start.js"></script>
</body>

</html>
